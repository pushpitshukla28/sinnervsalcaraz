name: Update Stats

# Runs every 45 minutes and whenever triggered manually from GitHub UI
on:
  schedule:
    - cron: "0,45 * * * *"   # At :00 and :45 past every hour
  workflow_dispatch:           # Manual trigger button in GitHub Actions tab

# Allow the workflow to push updated data.json back to the repo
permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # No pip installs needed — script uses only stdlib (urllib, json, re)

      - name: Run stats updater
        run: python scripts/update_stats.py

      - name: Commit & push updated data.json (if changed)
        run: |
          git config user.name  "stats-bot"
          git config user.email "stats-bot@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "✓ data.json unchanged — nothing to commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: auto-update stats [$TIMESTAMP]"
            git push
            echo "✅ Pushed updated data.json. Vercel will redeploy automatically."
          fi
